name: Gradle CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read Java version
        id: java
        run: |
          JAVA_VERSION=$(grep -E '^\s*java_version\s*=' gradle.properties | sed 's/.*=\s*//' | tr -d '[:space:]')
          if [ -z "$JAVA_VERSION" ]; then
            echo "::error::Could not determine Java version from gradle.properties"
            exit 1
          fi
          echo "version=$JAVA_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up JDK ${{ steps.java.outputs.version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps.java.outputs.version }}
          cache: gradle
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Check Java & Gradle versions
        run: |
          java --version
          ./gradlew --version
      - name: Build
        run: ./gradlew --no-daemon build -x test
